    get:
      tags:
      - Admin Analytics
      summary: Скачать кадр распознавания
      operationId: getDetectionSnapshot
      description: Возвращает raw или annotated JPEG конкретного распознавания. API скачивает зашифрованный PTSNAP01 из S3,
        проверяет AES-256-GCM и расшифровывает его только в памяти. Требуется analytics.view.
      parameters:
      - $ref: '#/components/parameters/DetectionRunId'
      - name: variant
        in: query
        required: false
        description: Вариант кадра.
        schema:
          type: string
          enum:
          - raw
          - annotated
          default: raw
      responses:
        '200':
          description: Расшифрованный JPEG выбранного распознавания.
          headers:
            Content-Disposition:
              $ref: '#/components/headers/ContentDisposition'
            Cache-Control:
              $ref: '#/components/headers/CacheControlPrivateNoStore'
            X-Detection-Run-Id:
              $ref: '#/components/headers/DetectionRunId'
            X-Snapshot-Captured-At:
              $ref: '#/components/headers/SnapshotCapturedAt'
            X-Snapshot-Variant:
              $ref: '#/components/headers/SnapshotVariant'
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
