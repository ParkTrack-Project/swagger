components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Top:
      name: top
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
      description: Максимальное количество элементов.
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Смещение для пагинации.
    BBox:
      name: bbox
      in: query
      required: false
      schema:
        type: string
        example: 30.30,59.92,30.35,59.97
      description: 'Пространственный фильтр: min_lon,min_lat,max_lon,max_lat'
    Q:
      name: q
      in: query
      required: false
      schema:
        type: string
      description: Поиск по текстовым полям.
    CameraId:
      name: camera_id
      in: path
      required: true
      schema:
        type: integer
      description: Идентификатор камеры.
    ObservedAt:
      name: observed_at
      in: path
      required: true
      schema:
        type: string
        format: date-time
      description: Время наблюдения.
    ZoneId:
      name: zone_id
      in: path
      required: true
      schema:
        type: integer
      description: Идентификатор парковочной зоны.
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
      description: Идентификатор пользователя.
    PartnerId:
      name: partner_id
      in: path
      required: true
      schema:
        type: integer
      description: Идентификатор партнёра.
    ObservationId:
      name: observation_id
      in: path
      required: true
      schema:
        type: integer
      description: Идентификатор наблюдения занятости.
    ForecastId:
      name: forecast_id
      in: path
      required: true
      schema:
        type: integer
      description: Идентификатор прогноза.
    RouteId:
      name: route_id
      in: path
      required: true
      schema:
        type: integer
      description: Идентификатор маршрута.
    SourceId:
      name: source_id
      in: path
      required: true
      schema:
        type: integer
      description: Идентификатор источника данных.
    DetectionRunId:
      name: detection_run_id
      in: path
      required: true
      description: Идентификатор запуска распознавания (observation_id).
      schema:
        type: integer
        minimum: 1
    FeedbackId:
      name: feedback_id
      in: path
      required: true
      description: Идентификатор обратной связи по распознаванию.
      schema:
        type: integer
        minimum: 1
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnsupportedMediaType:
      description: Unsupported Media Type
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NoContent:
      description: No Content
    BadGateway:
      description: Bad Gateway — зашифрованный артефакт повреждён, подменён или имеет неверный формат.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        error_description:
          type: string
          description: Описание ошибки
