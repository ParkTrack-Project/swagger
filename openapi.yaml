    ContentDisposition:
      description: inline для JPEG или attachment для YOLO labels; содержит имя файла.
      schema:
        type: string
      example: inline; filename="annotated.jpg"
    CacheControlPrivateNoStore:
      description: Запрещает публичное и локальное кеширование расшифрованного артефакта.
      schema:
        type: string
        enum:
        - private, no-store
    DetectionRunId:
      description: Идентификатор распознавания, которому принадлежит артефакт.
      schema:
        type: integer
      example: 101
    SnapshotCapturedAt:
      description: Время кадра из проверенного заголовка контейнера PTSNAP01.
      schema:
        type: string
        format: date-time
      example: '2026-07-22T08:09:10.123456Z'
    SnapshotVariant:
      description: Фактически возвращённый вариант артефакта.
      schema:
        type: string
        enum:
        - raw
        - annotated
        - labels
